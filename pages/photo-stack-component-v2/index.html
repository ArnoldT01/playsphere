<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo stack v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="photostack">

        <div class="image-wrapper">
            <div class="image-container">
                <img src="../photo-stack-component-v1/1.png" alt="Photo 1">
            </div>
            <div class="overlay">Nice View</div>
        </div>

        <div class="image-wrapper">
            <div class="image-container">
                <img src="../photo-stack-component-v1/2.jpg" alt="Photo 2">
            </div>
            <div class="overlay">Mountains</div>
        </div>

        <div class="image-wrapper">
            <div class="image-container">
                <img src="../photo-stack-component-v1/3.jpg" alt="Photo 3">
            </div>
            <div class="overlay">City Life</div>
        </div>

    </div>
    
</body>
</html>
