<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Stack Component v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="photostack">

        <div class="image-container">
            <img src="1.png" alt="Photo 1">
            <div class="overlay">Nice View</div>
        </div>

        <div class="image-container">
            <img src="2.jpg" alt="Photo 2">
            <div class="overlay">Mountains</div>
        </div>

        <div class="image-container">
            <img src="3.jpg" alt="Photo 3">
            <div class="overlay">City Life</div>
        </div>
        
    </div>

</body>
</html>
